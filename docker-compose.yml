version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: secureauth-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: secureauth
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - secureauth-network

  backend:
    build: ./backend
    container_name: secureauth-backend
    environment:
      MONGODB_URI: mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@mongodb:27017/secureauth
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - secureauth-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: secureauth-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - secureauth-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  secureauth-network:
    driver: bridge
